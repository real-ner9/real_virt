<div class="item" *ngIf="value">
  <header class="user-header">
    <div class="name-container" *ngIf="value.name">
      <span class="name">{{ value.name }}</span>
    </div>
    <button mat-button [matMenuTriggerFor]="menu"><app-icon icon="points"></app-icon></button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item [matMenuTriggerFor]="reasons" [disabled]="likedUser.has(value.id)">Пожаловаться</button>
      <button mat-menu-item (click)="onBlockUser()" [disabled]="likedUser.has(value.id)">Заблокировать</button>
    </mat-menu>

    <mat-menu #reasons="matMenu">
      <button
        mat-menu-item
        *ngFor="let complaint of complaints"
        (click)="onReport(complaint.value)"
        [disabled]="likedUser.has(value.id)">
        {{ complaint.label }}
      </button>
    </mat-menu>
  </header>
  <div class="statuses" *ngIf="value.online">
    <span class="online" *ngIf="value.online">В сети</span>
  </div>
  <mat-chip-listbox class="chips">
    <mat-chip *ngIf="value.dateOfBirth">
      {{ value.dateOfBirth | age }}
    </mat-chip>
    <mat-chip *ngIf="!value.dateOfBirth && value.age">
      {{ value.age }}
    </mat-chip>
    <mat-chip color="primary" *ngIf="value.role">
      {{ UserRoleMap[value.role] || value.role }}
    </mat-chip>
  </mat-chip-listbox>
  <div class="content" *ngIf="value.description" [innerText]="value.description"></div>
  <div class="image" *ngIf="value.photoUrl">
    <img src="{{ value.photoUrl | photoUrl }}" alt="Фотография с {{ value.name }}">
  </div>
  <div class="actions">
    <button [disabled]="likedUser.has(value.id)" mat-raised-button (click)="handleDislike(value)" class="icon-button">
      <app-icon icon="dislike"></app-icon>
    </button>
    <button [disabled]="likedUser.has(value.id)" mat-raised-button (click)="handleLike(value)" class="icon-button approve">
      <app-icon icon="like"></app-icon>
    </button>
  </div>
</div>
