<div class="feed-tab-switcher">
  <nav mat-tab-nav-bar>
    <a mat-tab-link
       *ngFor="let link of navLinks"
       [routerLink]="link.link"
       routerLinkActive
       #rla="routerLinkActive"
       [disabled]="!!link.disabled"
       [active]="rla.isActive">
      <div [class.active]="rla.isActive" class="tab-label-container">
        <span class="tab-label tab-label_{{link.labelKey}}">
          {{ link.label }}
        </span>
      </div>
    </a>
  </nav>
</div>
