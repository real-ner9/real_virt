<div class="items" *ngIf="(feed$ | async) as items" waIntersectionObserver>
  <app-feed-list-item
    page="feed"
    *ngFor="let item of items; let i = index"
    [value]="item"
    (waIntersectionObservee)="onIntersection($event, i, items.length)">
  </app-feed-list-item>
</div>
<app-background-for-switcher></app-background-for-switcher>
