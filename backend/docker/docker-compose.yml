version: '3.9'


services:
  go_to_virt_db:
    image: postgres:15.4-bullseye
    restart: always
    environment:
      - POSTGRES_USER=go_to_virt
      - POSTGRES_DB=go_to_virt
      - POSTGRES_PASSWORD=go_to_virt
    container_name: go_to_virt_db
    volumes:
      - go_to_virt_db:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U go_to_virt -d go_to_virt
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - go_to_virt


  go_to_virt_app:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
      target: go_to_vrit_app
    container_name: go_to_virt_app
    depends_on:
      go_to_virt_db:
        condition: service_healthy
    networks:
      - go_to_virt
    ports:
      - "3000:3000"

  go_to_virt_frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: go_to_virt_frontend
    volumes:
      - frontend-dist:/usr/share/nginx/html
    networks:
      - go_to_virt


  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - frontend-dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./server.crt:/etc/nginx/server.crt
      - ./server.key:/etc/nginx/server.key
      - ./chain.crt:/etc/nginx/chain.crt
    networks:
      - go_to_virt
    ports:
      - "80:80"
      - "443:443"

volumes:
  go_to_virt_db:
    name: go_to_virt_db
  frontend-dist:
    name: frontend-dist


networks:
  go_to_virt:
    name: go_to_virt
